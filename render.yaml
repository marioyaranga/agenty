# Blueprint Render: servicio web gratuito para la API Flask.
# Sustituir <repo-url> conectando el repositorio desde el dashboard si aplica.
services:
  - type: web
    name: workyai-api
    runtime: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    # SEO chat: Gemini + DataForSEO pueden superar 30s; el default de gunicorn corta el worker.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180 --graceful-timeout 30
    healthCheckPath: /health
    envVars:
      - key: WEB_ORIGIN
        sync: false
        # Valor: URL de producción de Vercel (p. ej. https://<proyecto>.vercel.app)
      - key: SUPABASE_URL
        sync: false
        # Placeholder hasta Fase 2: URL del proyecto Supabase
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
        # Secreto de servicio; solo en Render, nunca en NEXT_PUBLIC_*
      - key: TENANT_SECRETS_FERNET_KEY
        sync: false
        # Obligatoria para PUT /settings/ai: salida de
        # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
        # Misma clave en todos los dynos; rotar implica re-guardar claves Gemini por tenant.
      - key: GEMINI_API_KEY
        sync: false
        # Opcional pero recomendada: fallback global si un tenant no guardó clave propia.
